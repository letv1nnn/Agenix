apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: mutating-webhook-configuration
webhooks:
- name: mpod.agenix.io
  admissionReviewVersions: [v1]
  clientConfig:
    service:
      name: webhook-service
      namespace: system  
      path: /mutate-pods      
  failurePolicy: Ignore
  sideEffects: None
  rules:
  - apiGroups: [""]
    apiVersions: [v1]
    operations: [CREATE]
    resources: [pods]