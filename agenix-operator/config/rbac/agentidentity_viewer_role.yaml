# This rule is not used by the project agenix-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to agent.agenix.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: agenix-operator
    app.kubernetes.io/managed-by: kustomize
  name: agentidentity-viewer-role
rules:
- apiGroups:
  - agent.agenix.io
  resources:
  - agentidentities
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - agent.agenix.io
  resources:
  - agentidentities/status
  verbs:
  - get
